async function loadGmailMessage(id) {
  const params = new URLSearchParams({
    format: "metadata",
    metadataHeaders: "Subject",
  });
  params.append("metadataHeaders", "From");

  return googleFetch(`https://gmail.googleapis.com/gmail/v1/users/me/messages/${id}?${params}`);
}

function requestGoogleToken(scopes) {
  return new Promise((resolve, reject) => {
    if (!state.settings.googleClientId) {
      reject(new Error("׳—׳¡׳¨ Google OAuth Client ID"));
      return;
    }

    if (!window.google?.accounts?.oauth2) {
      reject(new Error("׳¡׳₪׳¨׳™׳™׳× Google ׳¢׳“׳™׳™׳ ׳׳ ׳ ׳˜׳¢׳ ׳”. ׳ ׳¡׳• ׳©׳•׳‘ ׳‘׳¢׳•׳“ ׳¨׳’׳¢."));
      return;
    }

    const client = window.google.accounts.oauth2.initTokenClient({
      client_id: state.settings.googleClientId,
      scope: scopes.join(" "),
      hint: state.currentUserEmail || undefined,
      callback: (response) => {
        if (response.error) {
          reject(new Error(response.error_description || response.error));
          return;
        }
        runtime.accessToken = response.access_token;
        String(response.scope || "")
          .split(" ")
          .filter(Boolean)
          .forEach((scope) => runtime.grantedScopes.add(scope));
        resolve(response);
      },
    });

    client.requestAccessToken({ prompt: state.currentUserEmail ? "" : "consent" });
  });
}

async function loadGoogleProfile(accessToken) {
  const response = await fetch("https://openidconnect.googleapis.com/v1/userinfo", {
    headers: { Authorization: `Bearer ${accessToken}` },
  });

  if (!response.ok) {
    throw new Error("׳׳ ׳”׳¦׳׳—׳×׳™ ׳׳§׳¨׳•׳ ׳׳× ׳₪׳¨׳˜׳™ ׳”׳׳©׳×׳׳© ׳-Google");
  }

  const profile = await response.json();
  const email = String(profile.email || "").toLowerCase();
  if (!email.endsWith("@gmail.com")) {
    throw new Error("׳”׳—׳©׳‘׳•׳ ׳—׳™׳™׳‘ ׳׳”׳™׳•׳× ׳›׳×׳•׳‘׳× Gmail");
  }

  state.currentUserEmail = email;
  const existing = state.members.find((member) => member.email.toLowerCase() === email);

  if (existing) {
    existing.name = profile.name || existing.name;
    existing.picture = profile.picture || existing.picture;
    existing.status = "׳₪׳¢׳™׳";
    existing.lastActive = new Date().toISOString();
  } else {
    state.members.push({
      id: uid(),
      email,
      name: profile.name || email.split("@")[0],
      role: state.members.some((member) => member.role === "owner" || member.role === "admin") ? "user" : "owner",
      status: "׳₪׳¢׳™׳",
      picture: profile.picture || "",
      lastActive: new Date().toISOString(),
    });
  }

  saveState();
}

async function googleFetch(url) {
  if (!runtime.accessToken) throw new Error("׳¦׳¨׳™׳ ׳׳”׳×׳—׳‘׳¨ ׳-Google ׳׳—׳“׳©");
  const response = await fetch(url, {
    headers: { Authorization: `Bearer ${runtime.accessToken}` },
  });
  if (!response.ok) {
    const text = await response.text();
    throw new Error(`Google ׳”׳—׳–׳™׳¨׳” ׳©׳’׳™׳׳” (${response.status}): ${text.slice(0, 120)}`);
  }
  return response.json();
}

function mapCalendarEvent(event) {
  const text = `${event.summary || ""} ${event.description || ""} ${event.location || ""}`;
  const start = event.start?.dateTime || event.start?.date || "";
  return {
    id: event.id,
    title: event.summary || "׳׳™׳¨׳•׳¢ ׳׳׳ ׳©׳",
    date: start.slice(0, 10) || localISO(0),
    time: event.start?.dateTime ? start.slice(11, 16) : "",
    categoryId: guessCategory(text),
    childIds: guessChildren(text),
    source: "Google Calendar",
    link: event.htmlLink || "",
  };
}

function mapGmailMessage(message) {
  const headers = message.payload?.headers || [];
  const getHeader = (name) => headers.find((header) => header.name.toLowerCase() === name.toLowerCase())?.value || "";
  const subject = getHeader("Subject");
  const from = getHeader("From");
  const date = getHeader("Date");
  const parsedDate = date ? new Date(date) : null;
  const text = `${subject} ${from} ${message.snippet || ""}`;
  return {
    id: message.id,
    threadId: message.threadId,
    subject,
    from,
    date: parsedDate && !Number.isNaN(parsedDate.valueOf()) ? parsedDate.toISOString() : "",
    snippet: message.snippet || "",
    categoryId: guessCategory(text),
    childIds: guessChildren(text),
    source: "Gmail",
    webLink: message.threadId ? `https://mail.google.com/mail/u/0/#inbox/${message.threadId}` : "",
  };
}

function filteredTasks() {
  const query = (state.ui.search || "").trim().toLowerCase();
  return state.tasks
    .filter((task) => state.ui.childFilter === "all" || task.childIds.includes(state.ui.childFilter))
    .filter((task) => state.ui.categoryFilter === "all" || task.categoryId === state.ui.categoryFilter)
    .filter((task) => !query || `${task.title} ${task.notes}`.toLowerCase().includes(query))
    .sort(sortTasks);
}

function sortTasks(a, b) {
  const aKey = `${a.status === "done" ? "2" : "1"}-${a.dueDate || "9999-99-99"}-${a.dueTime || "99:99"}`;
  const bKey = `${b.status === "done" ? "2" : "1"}-${b.dueDate || "9999-99-99"}-${b.dueTime || "99:99"}`;
  return aKey.localeCompare(bKey);
}

function agendaItemsForDate(isoDate) {
  const tasks = state.tasks
    .filter((task) => task.dueDate === isoDate && task.status !== "done")
    .map((task) => ({
      id: task.id,
      title: task.title,
      categoryId: task.categoryId,
      childIds: task.childIds,
      time: task.dueTime,
      kind: "task",
    }));
  const events = state.calendarEvents
    .filter((event) => event.date === isoDate)
    .map((event) => ({
      id: event.id,
      title: event.title,
      categoryId: event.categoryId,
      childIds: event.childIds,
      time: event.time,
      kind: "event",
    }));
  return [...tasks, ...events].sort((a, b) => (a.time || "99:99").localeCompare(b.time || "99:99"));
}

function uid() {
  return crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

function localISO(offset = 0) {
  return localISOFromDate(addDays(new Date(), offset));
}

function localISOFromDate(date) {
  const copy = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const offset = copy.getTimezoneOffset() * 60000;
  return new Date(copy.getTime() - offset).toISOString().slice(0, 10);
}

function addDays(date, days) {
  const copy = new Date(date);
  copy.setDate(copy.getDate() + days);
  return copy;
}

function formatDate(value) {
  if (!value) return "׳׳׳ ׳×׳׳¨׳™׳";
  return new Intl.DateTimeFormat("he-IL", { day: "2-digit", month: "2-digit", year: "numeric" }).format(new Date(`${value}T12:00:00`));
}

function formatLongDate(date) {
  return new Intl.DateTimeFormat("he-IL", { weekday: "long", day: "numeric", month: "long" }).format(date);
}

function formatDateTime(value) {
  if (!value) return "";
  return new Intl.DateTimeFormat("he-IL", {
    day: "2-digit",
    month: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
  }).format(new Date(value));
}

function weekday(date) {
  return new Intl.DateTimeFormat("he-IL", { weekday: "short" }).format(date);
}

function initials(value = "") {
  const words = value.replace(/@.*/, "").split(/\s+/).filter(Boolean);
  return words
    .slice(0, 2)
    .map((word) => word[0])
    .join("")
    .toUpperCase();
}

function renderEmpty(text) {
  return `<div class="empty">${escapeHTML(text)}</div>`;
}

function toast(message) {
  const region = document.querySelector("#toast-region") || document.body;
  clearTimeout(runtime.toastTimer);
  region.innerHTML = `<div class="toast">${escapeHTML(message)}</div>`;
  runtime.toastTimer = window.setTimeout(() => {
    region.innerHTML = "";
  }, 3200);
}

function escapeHTML(value = "") {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeAttr(value = "") {
  return escapeHTML(value);
}
